apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: balances-watcher
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: balances-watcher
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
